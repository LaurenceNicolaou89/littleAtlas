name: little_atlas
description: "Little Atlas - Family-friendly places & events in Cyprus"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  dio: ^5.7.0
  provider: ^6.1.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  geolocator: ^13.0.2
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  google_fonts: ^6.2.1
  lottie: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/lottie/
