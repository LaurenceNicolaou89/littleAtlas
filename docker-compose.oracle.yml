# Oracle Cloud Always Free deployment
#
# Prerequisites:
#   - Oracle Cloud ARM VM (A1.Flex, 4 OCPUs, 24GB RAM)
#   - Docker + Docker Compose installed
#   - Domain DNS A record pointing to VM's public IP
#   - .env file with required variables (see docs/deployment-oracle.md)
#
# Usage:
#   docker compose -f docker-compose.oracle.yml up -d
#   docker compose -f docker-compose.oracle.yml logs -f

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      - api
    networks:
      - littleatlas

  api:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/littleatlas
      - REDIS_URL=redis://redis:6379
      - OPENWEATHERMAP_API_KEY=${OPENWEATHERMAP_API_KEY}
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - ENVIRONMENT=production
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      - littleatlas

  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: littleatlas
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d littleatlas"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - littleatlas

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - littleatlas

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  littleatlas:
    driver: bridge
